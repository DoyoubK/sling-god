<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>새총의 신 — 레벨 업</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:390px; height:844px; overflow:hidden; font-family:'Pretendard',system-ui,sans-serif; background:rgba(25,31,40,0.93); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
@keyframes pop{0%{transform:scale(0.5);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.icon { font-size:72px; animation:pop .5s ease-out; }
.levelup-text { font-size:16px; font-weight:700; color:#A8D4F0; letter-spacing:.12em; text-transform:uppercase; }
.level-num { font-size:64px; font-weight:900; color:#F8D848; text-shadow:0 0 30px rgba(248,216,72,0.6); }
.card { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:16px; padding:20px 28px; display:flex; flex-direction:column; gap:10px; min-width:260px; }
.card-row { display:flex; justify-content:space-between; align-items:center; }
.card-label { font-size:13px; color:#6B7684; }
.card-value { font-size:15px; font-weight:700; color:#fff; }
.card-value.green { color:#22C55E; }
.btn-next { width:240px; height:52px; background:#3182F6; color:#fff; font-size:17px; font-weight:700; border:none; border-radius:14px; cursor:pointer; box-shadow:0 4px 20px rgba(49,130,246,0.5); margin-top:8px; }
</style>
</head>
<body>
  <div class="icon">🎉</div>
  <div class="levelup-text">LEVEL UP!</div>
  <div class="level-num">Lv. 3</div>
  <div class="card">
    <div class="card-row"><span class="card-label">이번 레벨 명중</span><span class="card-value">15마리</span></div>
    <div class="card-row"><span class="card-label">새 속도</span><span class="card-value green">↑ 빨라졌어요</span></div>
    <div class="card-row"><span class="card-label">목표</span><span class="card-value">24마리</span></div>
  </div>
  <button class="btn-next">다음 레벨 →</button>
</body>
</html>
