<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>새총의 신 — UI Preview</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; font-family:'Pretendard',system-ui,sans-serif; display:flex; flex-direction:column; align-items:center; gap:32px; padding:32px 16px; }
  h1 { color:#fff; font-size:20px; font-weight:700; }
  .grid { display:flex; flex-wrap:wrap; gap:24px; justify-content:center; }
  .card { background:#222; border-radius:16px; overflow:hidden; }
  .card h2 { color:#aaa; font-size:12px; font-weight:600; text-align:center; padding:10px; letter-spacing:.08em; text-transform:uppercase; }
  .frame-wrap { position:relative; width:390px; height:250px; overflow:hidden; cursor:pointer; transition:transform .2s; }
  .frame-wrap:hover { transform:scale(1.02); }
  .frame-wrap iframe { width:390px; height:844px; border:none; transform:scale(0.2965); transform-origin:top left; pointer-events:none; }
  .btn { display:block; text-align:center; padding:10px; background:#3182F6; color:#fff; font-size:13px; font-weight:600; text-decoration:none; }
  .btn:hover { background:#1C64D1; }
</style>
</head>
<body>
<h1>🎯 새총의 신 — UI Preview</h1>
<div class="grid">
  <div class="card">
    <h2>메인 메뉴</h2>
    <div class="frame-wrap"><iframe src="main-menu.html"></iframe></div>
    <a class="btn" href="main-menu.html" target="_blank">전체 화면으로 보기</a>
  </div>
  <div class="card">
    <h2>게임 화면</h2>
    <div class="frame-wrap"><iframe src="game.html"></iframe></div>
    <a class="btn" href="game.html" target="_blank">전체 화면으로 보기</a>
  </div>
  <div class="card">
    <h2>게임 오버</h2>
    <div class="frame-wrap"><iframe src="gameover.html"></iframe></div>
    <a class="btn" href="gameover.html" target="_blank">전체 화면으로 보기</a>
  </div>
  <div class="card">
    <h2>레벨 업</h2>
    <div class="frame-wrap"><iframe src="levelup.html"></iframe></div>
    <a class="btn" href="levelup.html" target="_blank">전체 화면으로 보기</a>
  </div>
</div>
</body>
</html>
