<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>새총의 신 — 게임 오버</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:390px; height:844px; overflow:hidden; font-family:'Pretendard',system-ui,sans-serif; background:#F9FAFB; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
.icon { font-size:64px; }
.title { font-size:32px; font-weight:800; color:#191F28; }
.stats { background:#fff; border:1.5px solid #E5E8EB; border-radius:16px; padding:20px 32px; display:flex; flex-direction:column; gap:12px; min-width:280px; }
.stat-row { display:flex; justify-content:space-between; align-items:center; }
.stat-label { font-size:14px; color:#6B7684; font-weight:500; }
.stat-value { font-size:20px; font-weight:700; color:#191F28; }
.stat-value.blue { color:#3182F6; }
.divider { height:1px; background:#E5E8EB; }
.btn-area { display:flex; flex-direction:column; gap:12px; width:280px; }
.btn-ad { height:52px; background:#3182F6; color:#fff; font-size:16px; font-weight:700; border:none; border-radius:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 12px rgba(49,130,246,0.35); }
.btn-restart { height:48px; background:#fff; color:#6B7684; font-size:15px; font-weight:600; border:1.5px solid #E5E8EB; border-radius:14px; cursor:pointer; }
.miss-icons { display:flex; gap:8px; }
.miss-icon { width:28px; height:28px; background:#EF4444; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:800; }
</style>
</head>
<body>
  <div class="icon">💀</div>
  <div class="title">게임 오버</div>
  <div class="stats">
    <div class="stat-row">
      <span class="stat-label">도달 레벨</span>
      <span class="stat-value blue">Lv. 3</span>
    </div>
    <div class="divider"></div>
    <div class="stat-row">
      <span class="stat-label">총 명중</span>
      <span class="stat-value">24마리</span>
    </div>
    <div class="divider"></div>
    <div class="stat-row">
      <span class="stat-label">미스</span>
      <div class="miss-icons">
        <div class="miss-icon">✕</div>
        <div class="miss-icon">✕</div>
        <div class="miss-icon">✕</div>
      </div>
    </div>
  </div>
  <div class="btn-area">
    <button class="btn-ad">📺&nbsp; 광고 보고 계속하기</button>
    <button class="btn-restart">처음부터 다시</button>
  </div>
</body>
</html>
